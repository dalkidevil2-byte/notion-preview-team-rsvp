);n[k]=v;return n;});});}\n  function eMapUp(idx,e){var f=e.target.files[0];if(f){var rd=new FileReader();rd.onload=function(ev){upESess(idx,'mapImage',ev.target.result);};rd.readAsDataURL(f);}}\n  function handleSaveEdit(){\n    var sd=eSessions.map(function(s){return{name:s.name.trim(),place:s.place.trim(),placeLink:s.placeLink.trim(),desc:s.desc?s.desc.trim():''};});\n    onEdit(event.id,{행사명:eName.trim(),날짜:eDate,장소:eSessions[0].place.trim(),장소링크:eSessions[0].placeLink.trim(),지도이미지:'',파트목록:sd.some(function(s){return s.name||s.place||s.placeLink||s.desc;})?JSON.stringify(sd):'',설명:eDesc.trim()},eSessions);\n    setEditing(false);\n  }\n  var currentNames=getUniqueNames(evtR);\n  var availableNames=teamMembers.filter(function(m){return currentNames.indexOf(m)===-1;});\n  var filteredR=activePart!=='전체'?evtR.filter(function(r){return r.파트===activePart;}):evtR;\n\n  if(editing)return(\n    <div>\n      <button className=\"back-btn\" onClick={function(){setEditing(false);}}>← 돌아가기</button>\n      <div className=\"form-container\">\n        <h2 className=\"form-title\">✏️ 행사 수정</h2>\n        <div className=\"form-group\"><label className=\"form-label\">행사명</label><input className=\"form-input\" value={eName} onChange={function(e){setEName(e.target.value);}} /></div>\n        <div className=\"form-group\"><label className=\"form-label\">날짜</label><input className=\"form-input\" type=\"date\" value={eDate} onChange={function(e){setEDate(e.target.value);}} /></div>\n        <div className=\"form-group\"><label className=\"form-label\">설명</label><textarea className=\"form-textarea\" value={eDesc} onChange={function(e){setEDesc(e.target.value);}} /></div>\n        <div className=\"section-divider\"></div>\n        <div className=\"form-group\"><label className=\"form-label\">📑 세션</label></div>\n        {eSessions.map(function(sess,idx){return(\n          <div key={idx} className=\"session-card\">\n            <div className=\"session-header\"><span className=\"session-label\">{eSessions.length>1?'세션 '+(idx+1):''}</span>{eSessions.length>1&&<button type=\"button\" className=\"remove-btn\" onClick={function(){rmESess(idx);}}>×</button>}</div>\n            {eSessions.length>1&&<div className=\"form-group\"><label className=\"form-label\">세션명</label><input className=\"form-input\" value={sess.name} onChange={function(e){upESess(idx,'name',e.target.value);}} placeholder=\"예: 1부\" /></div>}\n            <div className=\"form-group\"><label className=\"form-label\">{eSessions.length>1?'세션 안내':'안내'}</label><textarea className=\"form-textarea\" value={sess.desc||''} onChange={function(e){upESess(idx,'desc',e.target.value);}} placeholder=\"안내사항 또는 선택지\" /></div>\n            <button type=\"button\" className=\"btn btn-secondary btn-sm\" onClick={function(){upESess(idx,'showVenue',!sess.showVenue);}}>{sess.showVenue?'📍 장소 정보 접기':'📍 장소 정보 추가'}</button>\n            {sess.showVenue&&<div className=\"venue-fields\">\n              <div className=\"form-group\"><label className=\"form-label\">장소</label><input className=\"form-input\" value={sess.place} onChange={function(e){upESess(idx,'place',e.target.value);}} /></div>\n              <div className=\"form-group\"><label className=\"form-label\">장소 링크</label><input className=\"form-input\" value={sess.placeLink} onChange={function(e){upESess(idx,'placeLink',e.target.value);}} /></div>\n              <div className=\"form-group\"><label className=\"form-label\">지도 이미지</label><input type=\"file\" accept=\"image/*\" className=\"form-input\" onChange={function(e){eMapUp(idx,e);}} />{sess.mapImage&&<div className=\"map-preview\"><img src={sess.mapImage} alt=\"미리보기\" /></div>}</div>\n            </div>}\n          </div>\n        );})}\n        <div className=\"form-group\"><button type=\"button\" className=\"btn btn-secondary btn-sm\" onClick={addESess}>+ 세션 추가</button></div>\n        <div className=\"btn-group\"><button className=\"btn btn-primary\" onClick={handleSaveEdit} disabled={saving}>{saving?'저장 중…':'저장'}</button><button className=\"btn btn-secondary\" onClick={function(){setEditing(false);}}>취소</button></div>\n      </div>\n    </div>\n  );\n  return(\n    <div>\n      <button className=\"back-btn\" onClick={onBack}>← 목록으로</button>\n      <div className=\"detail-info\">\n        <div className=\"card-header\"><span className=\"detail-title\">{event.행사명}</span><div className=\"card-badges\"><StatusBadge status={event.상태} /></div></div>\n        <div className=\"detail-meta\">\n          <div className=\"detail-meta-item\"><span>📅</span> {formatDate(event.날짜)}</div>\n          {parts.length>0&&<div className=\"detail-meta-item\"><span>📑</span> {parts.join(' · ')}</div>}\n        </div>\n        <VenueInfo event={event} />\n        {event.설명&&<div className=\"detail-desc\">{event.설명}</div>}\n        <div className=\"action-bar\">\n          {event.상태==='작성중'&&<button className=\"btn btn-success btn-sm\" onClick={function(){onStatusChange(event.id,'배포됨');}} disabled={saving}>📤 배포</button>}\n          {event.상태==='배포됨'&&<button className=\"btn btn-danger btn-sm\" onClick={function(){onStatusChange(event.id,'마감');}} disabled={saving}>🔒 마감</button>}\n          <button className=\"btn btn-secondary btn-sm\" onClick={function(){setEditing(true);}}>✏️ 수정</button>\n          <button className=\"btn btn-danger btn-sm\" onClick={function(){setConfirmDel(true);}}>🗑️ 삭제</button>\n          <button className=\"btn btn-secondary btn-sm\" onClick={onRefresh}>🔄 새로고침</button>\n        </div>\n      </div>\n      {confirmDel&&(\n        <div className=\"confirm-box\">\n          <p>⚠️ 정말 이 행사를 삭제하시겠습니까?</p>\n          <p className=\"form-hint\">관련된 참석 응답도 함께 삭제됩니다.</p>\n          <div className=\"btn-group\"><button className=\"btn btn-danger btn-sm\" onClick={function(){onDelete(event.id,evtR);}} disabled={saving}>{saving?'삭제 중…':'삭제'}</button><button className=\"btn btn-secondary btn-sm\" onClick={function(){setConfirmDel(false);}}>취소</button></div>\n        </div>\n      )}\n      {parts.length>0&&<PartTabs parts={parts} active={activePart} onChange={setActivePart} />}\n      <StatsPanel responses={evtR} activePart={parts.length>0?activePart:null} />\n      <div className=\"form-container\">\n        <h3 className=\"form-title\">👥 응답 목록 ({filteredR.length}명)</h3>\n        {filteredR.length===0?<div className=\"empty-box\"><div className=\"empty-icon\">👥</div><p>참석 대상자가 없습니다.</p></div>:\n        <div className=\"response-list\">{filteredR.map(function(r){return(\n          <div key={r.id} className=\"response-item\">\n            <div><div className=\"response-name\">{r.이름}{r.파트?' ('+r.파트+')':''}</div>{r.사유&&<div className=\"response-reason\">{r.사유}</div>}</div>\n            <div className=\"response-item-actions\"><AttBadge value={r.참석여부} /><button className=\"remove-btn\" title=\"제거\" onClick={function(){onRemoveAttendee(r.id);}}>×</button></div>\n          </div>\n        );})}</div>}\n        {availableNames.length>0&&(\n          <div className=\"attendee-mgmt\">\n            <label className=\"form-label\">➕ 대상자 추가</label>\n            <div className=\"attendee-mgmt-row\">\n              <select className=\"form-select\" value={addName} onChange={function(e){setAddName(e.target.value);}}>\n                <option value=\"\">팀원 선택</option>\n                {availableNames.map(function(n){return <option key={n} value={n}>{n}</option>;})}\n              </select>\n              <button className=\"btn btn-primary btn-sm\" onClick={function(){if(addName){onAddAttendee(event.id,addName,parts);setAddName('');}}} disabled={saving||!addName}>추가</button>\n            </div>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\nfunction AttendeeNameSelect({responses,onSubmit}){\n  const[picked,setPicked]=useState('');\n  var names=getUniqueNames(responses);\n  return(\n    <div className=\"name-input-container\">\n      <h2>🙋 본인 확인</h2>\n      <p>아래에서 본인 이름을 선택해주세요.</p>\n      {names.length===0?<p className=\"form-hint\">등록된 참석 대상자가 없습니다.</p>:<>\n        <select className=\"form-select\" value={picked} onChange={function(e){setPicked(e.target.value);}}>\n          <option value=\"\">이름을 선택하세요</option>\n          {names.map(function(n){return <option key={n} value={n}>{n}</option>;})}\n        </select>\n        <div className=\"btn-group\"><button className=\"btn btn-primary btn-block\" onClick={function(){if(picked)onSubmit(picked);}} disabled={!picked}>확인</button></div>\n      </>}\n    </div>\n  );\n}\n\nfunction AttendeeResponseForm({response,onRespond,saving}){\n  const[sel,setSel]=useState(response.참석여부||'미정');\n  const[reason,setReason]=useState(response.사유||'');\n  return(\n    <div className=\"form-container\">\n      <h3 className=\"form-title\">{response.파트?response.파트+' — 참석 여부':'참석 여부를 선택해주세요'}</h3>\n      <div className=\"attendance-options\">{ATT_OPTIONS.map(function(opt){return <div key={opt} className={'att-option'+(sel===opt?' selected':'')} onClick={function(){setSel(opt);}}><span className=\"att-option-emoji\">{ATT_EMOJI[opt]}</span><span className=\"att-option-label\">{opt}</span></div>;})}</div>\n      <div className=\"form-group\"><label className=\"form-label\">메모</label><textarea className=\"form-textarea\" value={reason} onChange={function(e){setReason(e.target.value);}} placeholder={sel==='참석'?'선택사항이 있으면 입력해주세요':'사유를 남겨주세요'} /></div>\n      <button className=\"btn btn-primary btn-block\" onClick={function(){onRespond(response.id,sel,reason);}} disabled={saving}>{saving?'제출 중…':'응답 제출'}</button>\n    </div>\n  );\n}\n\nfunction AttendeeDetail({event,myResponses,onBack,onRespond,saving}){\n  if(event.상태==='마감')return(\n    <div>\n      <button className=\"back-btn\" onClick={onBack}>← 목록으로</button>\n      <div className=\"detail-info\">\n        <div className=\"card-header\"><span className=\"detail-title\">{event.행사명}</span></div>\n        <div className=\"detail-meta\"><div className=\"detail-meta-item\"><span>📅</span> {formatDate(event.날짜)}</div></div>\n        <VenueInfo event={event} />\n        {event.설명&&<div className=\"detail-desc\">{event.설명}</div>}\n      </div>\n      <div className=\"form-container\"><p>🔒 이 행사는 마감되었습니다.</p>{myResponses.map(function(r){return <p key={r.id}>{r.파트?r.파트+': ':''}<AttBadge value={r.참석여부} /></p>;})}</div>\n    </div>\n  );\n  return(\n    <div>\n      <button className=\"back-btn\" onClick={onBack}>← 목록으로</button>\n      <div className=\"detail-info\">\n        <div className=\"card-header\"><span className=\"detail-title\">{event.행사명}</span></div>\n        <div className=\"detail-meta\"><div className=\"detail-meta-item\"><span>📅</span> {formatDate(event.날짜)}</div></div>\n        <VenueInfo event={event} />\n        {event.설명&&<div className=\"detail-desc\">{event.설명}</div>}\n      </div>\n      {myResponses.length===0?<div className=\"form-container\"><p>등록된 응답이 없습니다.</p></div>:\n        myResponses.map(function(resp){return <AttendeeResponseForm key={resp.id} response={resp} onRespond={onRespond} saving={saving} />;})}\n    </div>\n  );\n}\n\nfunction App(){\n  const[role,setRole]=useState('attendee');\n  const[view,setView]=useState('list');\n  const[events,setEvents]=useState([]);\n  const[responses,setResponses]=useState([]);\n  const[selectedEvent,setSelectedEvent]=useState(null);\n  const[attendeeName,setAttendeeName]=useState('');\n  const[teamMembers,setTeamMembers]=useState(loadTeam());\n  const[loading,setLoading]=useState(true);\n  const[saving,setSaving]=useState(false);\n  const[useFallback,setUseFallback]=useState(false);\n\n  var loadData=useCallback(async function(){\n    setLoading(true);\n    try{\n      var res=await Promise.all([queryDB(EVENTS_DB_ID,{sorts:[{property:'날짜',direction:'descending'}]}),queryDB(RESPONSES_DB_ID,{})]);\n      setEvents(res[0].results.map(parseEvent));setResponses(res[1].results.map(parseResponse));setUseFallback(false);\n    }catch(e){console.error(e.message);setEvents(FALLBACK_EVENTS);setResponses(FALLBACK_RESPONSES);setUseFallbac
